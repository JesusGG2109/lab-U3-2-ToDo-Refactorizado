<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
  <link href="https://stackpath.bootstrapcdn.com/bootswatch/4.5.2/darkly/bootstrap.min.css" rel="stylesheet"/>

  <title>FocusFlow • Task Manager</title>

  <style>
    body {
      background: linear-gradient(135deg, #1f1f1f, #2c2f33);
    }

    .app-title {
      font-weight: bold;
      letter-spacing: 1px;
    }

    .card-todo {
      background: #2c2f33;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .card-todo:hover {
      transform: translateY(-5px) scale(1.02);
      background: #343a40;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .btn-filter {
      border-radius: 20px;
      margin-right: 5px;
    }
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card-todo {
    cursor: grab;
}

  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <span class="navbar-brand app-title">FocusFlow </span>
</nav>

<main>
  <div class="container pt-4">

    <div class="row mb-4">
      <div class="col-md-3">
        <input type="text" id="title" class="form-control" placeholder="Título de tarea">
      </div>

      <div class="col-md-7">
        <input type="text" id="description" class="form-control" placeholder="Descripción">
      </div>

      <div class="col-md-2">
        <button class="btn btn-info btn-block" id="add">
          <i class="fa fa-plus"></i> Add
        </button>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <button class="btn btn-light btn-sm filter btn-filter" data-filter="all">All</button>
        <button class="btn btn-success btn-sm filter btn-filter" data-filter="completed">Completed</button>
        <button class="btn btn-warning btn-sm filter btn-filter" data-filter="pending">Pending</button>
      </div>

      <h5 id="counter">0 tareas</h5>
    </div>

    <div id="list" class="row"></div>

  </div>
</main>

<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
